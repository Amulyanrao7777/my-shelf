<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #faf7f2; font-family: 'DM Sans', sans-serif; }
  input, button, select, textarea { font-family: 'DM Sans', sans-serif; }
  .serif { font-family: 'Playfair Display', Georgia, serif; }

  /* Responsive layout */
  :root { --cols: 2; --max-w: 580px; --card-title: 13px; --score-size: 24px; }
  @media (min-width: 640px) {
    :root { --cols: 2; --max-w: 720px; --card-title: 14px; --score-size: 26px; }
  }
  @media (min-width: 1024px) {
    :root { --cols: 3; --max-w: 960px; --card-title: 15px; --score-size: 28px; }
  }
  .book-grid { display: grid; grid-template-columns: repeat(var(--cols), 1fr); gap: 14px; }
  .page-wrap { max-width: var(--max-w); margin: 0 auto; padding: 28px 18px; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .sync-cloud-spinning { animation: spin 1s linear infinite; transform-origin: center; display: inline-block; }

  /* Sync banner */
  #sync-banner {
    position: fixed; top: 0; left: 0; right: 0;
    background: #8b6f47; color: #fff;
    font-size: 12px; text-align: center; padding: 8px 12px;
    z-index: 9999; display: none; font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.03em;
  }
  #sync-banner.show { display: block; }

  /* Fade animation */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeIn 0.25s ease forwards; }

  /* Share card print styles */
  @media print {
    body > #root > div > div:not(.share-card-wrap) { display: none !important; }
  }

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── THEME ───────────────────────────────────────────────────────────────────
const C = {
  bg: "#faf7f2", warm: "#f5f0e8", border: "#e8e0d0",
  text: "#2c2416", muted: "#9a8c7a", accent: "#8b6f47",
  accentL: "#c4a882", amber: "#d4956a", white: "#fff",
  overlay: "rgba(44,36,22,0.45)",
  danger: "#b05e3a",
  dangerL: "#e8cdb8",
};

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const PILLARS = [
  { key: "feeling",    label: "Feeling",    prompt: "Did it move you? Did it get under your skin and make you feel something real?" },
  { key: "writing",   label: "Writing",    prompt: "Did the prose feel intentional? Did a sentence ever make you stop and reread it?" },
  { key: "imprint",   label: "Imprint",    prompt: "Will this live in your head a week later? Would you reread it or push it into someone's hands?" },
  { key: "pacing",    label: "Pacing",     prompt: "Did it flow? Or did it make you work too hard between the good parts?" },
  { key: "characters",label: "Characters", prompt: "Were they written with intention? Did any of them make you go — yeah, that's a character." },
];
const STATUSES = ["reading", "finished", "dropped", "want to read"];
const STORAGE_KEY = "amulya_shelf_v2";
const SERIES_VIBE_KEY = "amulya_series_vibe_v1";
const SYNC_KEY = "myshelf_sync_config";

// ─── LOCAL STORAGE ────────────────────────────────────────────────────────────
const load   = () => {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!Array.isArray(d)) return [];
    const map = {};
    d.forEach(b => {
      if (!b || b.id === undefined) return;
      const existing = map[b.id];
      if (!existing || (b.updatedAt || 0) >= (existing.updatedAt || 0)) map[b.id] = b;
    });
    return Object.values(map);
  } catch { return []; }
};
const loadSV = () => { try { const d = JSON.parse(localStorage.getItem(SERIES_VIBE_KEY)); return (d && typeof d==="object") ? d : {}; } catch { return {}; } };
const save   = (b)  => {
  if (!Array.isArray(b)) { console.error("save() rejected: not an array", b); return false; }
  try {
    const str = JSON.stringify(b);
    localStorage.setItem(STORAGE_KEY, str);
    const verify = localStorage.getItem(STORAGE_KEY);
    if (verify !== str) { console.error("save() verify failed"); return "quota"; }
    return true;
  } catch(e) {
    console.error("save() failed:", e);
    if (e.name === "QuotaExceededError" || e.name === "NS_ERROR_DOM_QUOTA_REACHED") return "quota";
    return false;
  }
};
const saveSV = (sv) => {
  if (!sv || typeof sv !== "object") { console.error("saveSV() rejected", sv); return false; }
  try { localStorage.setItem(SERIES_VIBE_KEY, JSON.stringify(sv)); return true; } catch(e) { console.error("saveSV() failed:", e); return false; }
};
const loadSyncConfig = () => { try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || null; } catch { return null; } };
const saveSyncConfig = (c) => { try { localStorage.setItem(SYNC_KEY, JSON.stringify(c)); } catch {} };

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const emptyBook = () => ({
  id: Date.now(), title: "", author: "", genre: "", status: "reading",
  seriesName: "", seriesNum: "",
  startDate: "",
  finishedDate: "",
  reads: [],
  activeReadIdx: 0,
  curve: [], pillars: { feeling:"", writing:"", imprint:"", pacing:"", characters:"" },
  characterRatings: [], vibe: "", decimals: 2, cover: null, bookNotes: "",
  updatedAt: Date.now(),
});

const emptyRead = (label) => ({
  id: Date.now().toString(36) + "-" + Math.random().toString(36).slice(2),
  label: label || "Read 1",
  startDate: new Date().toISOString().slice(0,10),
  curve: [],
  pillars: { feeling:"", writing:"", imprint:"", pacing:"", characters:"" },
  vibe: "",
});

const getActiveRead = (b) => {
  if (b.reads && b.reads.length > 0) {
    const rawIdx = parseInt(b.activeReadIdx, 10);
    const idx = Math.max(0, Math.min(isNaN(rawIdx) ? 0 : rawIdx, b.reads.length - 1));
    return b.reads[idx];
  }
  return { id: "legacy", label: "Read 1", curve: b.curve||[], pillars: b.pillars||{feeling:"",writing:"",imprint:"",pacing:"",characters:""}, vibe: b.vibe||"" };
};

const finalScoreForRead = (read) => {
  if (!read) return null;
  const pillars = (read.pillars && typeof read.pillars === "object") ? read.pillars : {};
  const vals = PILLARS.map(p => parseFloat(pillars[p.key])).filter(v => !isNaN(v) && v >= 1);
  const pa = vals.length ? vals.reduce((a,c)=>a+c,0)/vals.length : null;
  const vibe = parseFloat(read.vibe);
  const vibeValid = !isNaN(vibe) && vibe >= 1;
  if (pa===null && !vibeValid) return null;
  if (pa===null) return vibe;
  if (!vibeValid) return pa;
  return Math.min(5, Math.max(1, (pa+vibe)/2));
};

const clampNum = (v, min, max) => { const n = parseFloat(v); return isNaN(n) ? NaN : Math.min(max, Math.max(min, n)); };

const avgPillars = (b) => {
  let read;
  try { read = getActiveRead(b); } catch(e) { read = b; }
  const vals = PILLARS.map(p => parseFloat(((read && read.pillars)||b.pillars||{})[p.key])).filter(v => !isNaN(v));
  return vals.length ? vals.reduce((a,c)=>a+c,0)/vals.length : null;
};

const finalScore = (b) => {
  const read = getActiveRead(b);
  return finalScoreForRead(read);
};

// ─── COMPRESSION HELPERS ─────────────────────────────────────────────────────
const compressStr = async (str) => {
  try {
    if (typeof CompressionStream === "undefined") return { data: str, compressed: false };
    const stream = new CompressionStream("gzip");
    const writer = stream.writable.getWriter();
    const encoder = new TextEncoder();
    writer.write(encoder.encode(str));
    writer.close();
    const chunks = [];
    const reader = stream.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((a, c) => a + c.length, 0);
    const merged = new Uint8Array(total);
    let offset = 0;
    chunks.forEach(c => { merged.set(c, offset); offset += c.length; });
    let binary = "";
    merged.forEach(b => binary += String.fromCharCode(b));
    return { data: btoa(binary), compressed: true };
  } catch(e) {
    return { data: str, compressed: false };
  }
};

const decompressStr = async (data, compressed) => {
  if (!compressed) return data;
  try {
    const binary = atob(data);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const stream = new DecompressionStream("gzip");
    const writer = stream.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const chunks = [];
    const reader = stream.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((a, c) => a + c.length, 0);
    const merged = new Uint8Array(total);
    let offset = 0;
    chunks.forEach(c => { merged.set(c, offset); offset += c.length; });
    return new TextDecoder().decode(merged);
  } catch(e) {
    return data;
  }
};

// ─── SUPABASE SYNC ────────────────────────────────────────────────────────────
const supabaseFetch = async (url, anonKey, path, method="GET", body=null) => {
  const headers = {
    "apikey": anonKey,
    "Authorization": `Bearer ${anonKey}`,
    "Content-Type": "application/json",
  };
  if (method !== "GET") headers["Prefer"] = "resolution=merge-duplicates,return=minimal";
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${url}/rest/v1${path}`, opts);
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  if (res.status === 204) return null;
  const text = await res.text();
  if (!text || text === "") return null;
  try { return JSON.parse(text); } catch(e) { throw new Error("Bad JSON from server: " + text.slice(0,100)); }
};

const syncToCloud = async (cfg, books, seriesVibes) => {
  const { url, anonKey, userId } = cfg;
  if (!books || !Array.isArray(books)) throw new Error("syncToCloud: books is not an array");
  if (books.length === 0) throw new Error("syncToCloud: refusing to push empty books array");
  let validBooks = books.filter(b => b && b.id !== undefined && b.id !== null);
  if (!userId || !url || !anonKey) throw new Error("syncToCloud: missing config");
  const booksStr = JSON.stringify(validBooks);
  const seriesStr = JSON.stringify(seriesVibes || {});
  const [booksCompressed, seriesCompressed] = await Promise.all([
    compressStr(booksStr),
    compressStr(seriesStr),
  ]);
  const payload = {
    user_id: userId,
    books_json: booksCompressed.data,
    series_json: seriesCompressed.data,
    books_compressed: booksCompressed.compressed,
    series_compressed: seriesCompressed.compressed,
    updated_at: new Date().toISOString(),
  };
  const res = await fetch(`${url}/rest/v1/shelf_data2`, {
    method: "POST",
    headers: {
      "apikey": anonKey,
      "Authorization": `Bearer ${anonKey}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates,return=minimal",
    },
    body: JSON.stringify(payload),
  });
  if (!res.ok) { const t = await res.text(); throw new Error(`Supabase error: ${res.status} ${t}`); }
};

const syncFromCloud = async (cfg) => {
  const { url, anonKey, userId } = cfg;
  const data = await supabaseFetch(url, anonKey, `/shelf_data2?user_id=eq.${encodeURIComponent(userId)}&select=books_json,series_json,books_compressed,series_compressed,updated_at`);
  if (!data || !data.length) return null;
  const row = data[0];
  let books = [], seriesVibes = {};
  try {
    const rawBooks = await decompressStr(row.books_json || "[]", row.books_compressed || false);
    const b = JSON.parse(rawBooks);
    books = Array.isArray(b) ? b : [];
  } catch(e) { console.error("books_json parse error:", e); }
  try {
    const rawSeries = await decompressStr(row.series_json || "{}", row.series_compressed || false);
    const s = JSON.parse(rawSeries);
    seriesVibes = (s && typeof s === "object") ? s : {};
  } catch(e) { console.error("series_json parse error:", e); }
  return { books, seriesVibes, updatedAt: row.updated_at };
};

// ─── SAFE MERGE ───────────────────────────────────────────────────────────────
const mergeBooks = (local, remote) => {
  if (!Array.isArray(local)) local = [];
  if (!Array.isArray(remote)) remote = [];
  const map = {};
  local.forEach(b => { if (b && b.id !== undefined && b.id !== null) map[b.id] = b; });
  remote.forEach(b => {
    if (!b || b.id === undefined || b.id === null) return;
    const l = map[b.id];
    if (!l || (b.updatedAt||0) >= (l.updatedAt||0)) map[b.id] = b;
  });
  return Object.values(map);
};

const mergeSeries = (local, remote) => {
  if (!local || typeof local !== "object") local = {};
  if (!remote || typeof remote !== "object") remote = {};
  return { ...local, ...remote };
};

// ─── STYLES ───────────────────────────────────────────────────────────────────
const inp  = { width:"100%", padding:"9px 12px", borderRadius:8, border:`1px solid ${C.border}`, background:C.warm, color:C.text, fontSize:14, outline:"none", boxSizing:"border-box" };
const lbl  = { fontSize:12, color:C.muted, marginBottom:5, fontWeight:500, letterSpacing:"0.04em", display:"block", textTransform:"uppercase" };

const pillStyle = (active) => ({ flex:1, padding:"8px 0", borderRadius:8, border:`1px solid ${active?C.accent:C.border}`, background:active?C.accent:C.warm, color:active?C.white:C.muted, fontSize:13, cursor:"pointer" });

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function Logo({ size=32 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lgBot" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#f0a8be"/>
          <stop offset="100%" stopColor="#e891ad"/>
        </linearGradient>
        <linearGradient id="lgMid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#d4688a"/>

function MiniCurve({ curve }) {
  if (!curve || !curve.length) return null;
  const safeCurve = curve.filter(pt => pt && !isNaN(parseFloat(pt.score)));
  if (!safeCurve.length) return null;
  const W=300, H=44, pad=4, n=safeCurve.length;
  const pts = safeCurve.map((pt,i)=>{
    const x = pad+(n===1?(W-pad*2)/2:(i/(n-1))*(W-pad*2));
    const y = H-pad-((pt.score-1)/(10-1))*(H-pad*2);
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <polyline points={pts} fill="none" stroke={C.accentL} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

function CurveGraph({ curve }) {
  const [tooltip, setTooltip] = useState(null);
  const safeCurve = curve.filter(pt => pt && typeof pt === "object" && !isNaN(parseFloat(pt.score)));
  if (!safeCurve.length) return <div style={{ color:C.muted, fontSize:13, textAlign:"center", padding:"20px 0" }}>No shifts logged yet.</div>;
  const W=500, H=180, pL=30, pR=14, pT=10, pB=32;
  const plotW=W-pL-pR, plotH=H-pT-pB, n=safeCurve.length;
  const pts=safeCurve.map((pt,i)=>({
    x: pL+(n===1?plotW/2:(i/(n-1))*plotW),
    y: pT+(1-(Math.min(10,Math.max(1,pt.score))-1)/(10-1))*plotH,
    ...pt, label: pt.label||`#${i+1}`
  }));
  const polyline=pts.map(p=>`${p.x},${p.y}`).join(' ');
  const yTicks=[1,3,5,7,10];
  return (
    <div style={{ position:"relative" }}>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
        {yTicks.map(t=>{ const y=pT+(1-(t-1)/9)*plotH; return (
          <g key={t}>
            <line x1={pL} y1={y} x2={W-pR} y2={y} stroke={C.border} strokeWidth="0.7"/>
            <text x={pL-4} y={y+4} textAnchor="end" fontSize="9" fill={C.muted}>{t}</text>
          </g>
        );})}
        {pts.map((p,i)=>(
          <text key={i} x={p.x} y={H-6} textAnchor="middle" fontSize="9" fill={C.muted}>
            {p.label.length>8?p.label.slice(0,7)+"…":p.label}
          </text>
        ))}
        <polyline points={polyline} fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        {pts.map((p,i)=>{
          const star=(cx,cy,r)=>{const ir=r*0.25;return Array.from({length:4},(_,k)=>{const a1=-Math.PI/2+(k*Math.PI/2);const a2=-Math.PI/2+((k+0.5)*Math.PI/2);return `${cx+r*Math.cos(a1)},${cy+r*Math.sin(a1)} ${cx+ir*Math.cos(a2)},${cy+ir*Math.sin(a2)}`;}).join(' ');};
          return <polygon key={i} points={star(p.x,p.y,6)} fill={C.accent} style={{ cursor:"pointer" }}
            onMouseEnter={()=>setTooltip({...p,i})}
            onMouseLeave={()=>setTooltip(null)}
            onClick={()=>setTooltip(t=>t?.i===i?null:{...p,i})}/>;
        })}
      </svg>
      {tooltip && (
        <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 12px", fontSize:12, color:C.text, pointerEvents:"none", zIndex:10, whiteSpace:"nowrap", boxShadow:"0 2px 12px rgba(0,0,0,0.1)" }}>
          <div style={{ fontWeight:700 }}>{tooltip.label}</div>
          <div style={{ color:C.accent, fontWeight:600 }}>score: {tooltip.score}</div>
          {tooltip.note && <div style={{ color:C.muted, marginTop:2, fontStyle:"italic" }}>{tooltip.note}</div>}
        </div>
      )}
    </div>
  );
}

function RadarDisplay({ book }) {
  const pillars = (book && book.pillars) ? book.pillars : {};
  const data = PILLARS.map(p=>({ label:p.label, value:parseFloat(pillars[p.key])||0 }));
  if (!data.some(d=>d.value>0)) return <div style={{ color:C.muted, fontSize:13, textAlign:"center", padding:"20px 0" }}>Rate pillars to see radar.</div>;
  const cx=150, cy=115, r=75, n=data.length, off=-Math.PI/2;
  const ang=i=>off+(i/n)*2*Math.PI;
  const pt=(i,val,max=5)=>({ x:cx+((val/max)*r)*Math.cos(ang(i)), y:cy+((val/max)*r)*Math.sin(ang(i)) });
  const axPt=i=>({ x:cx+r*Math.cos(ang(i)), y:cy+r*Math.sin(ang(i)), lx:cx+(r+22)*Math.cos(ang(i)), ly:cy+(r+22)*Math.sin(ang(i)) });
  const rings=[1,2,3,4,5];
  const shapePath=(vals)=>vals.map((v,i)=>{ const p=pt(i,v); return `${i===0?"M":"L"}${p.x},${p.y}`; }).join(' ')+'Z';
  const dataPath=shapePath(data.map(d=>d.value));
  return (
    <svg width="100%" viewBox="0 0 300 230">
      {rings.map(ring=>(<path key={ring} d={shapePath(Array(n).fill(ring))} fill="none" stroke={C.border} strokeWidth="0.8"/>))}
      {data.map((_,i)=>{ const a=axPt(i); return <line key={i} x1={cx} y1={cy} x2={a.x} y2={a.y} stroke={C.border} strokeWidth="0.8"/>; })}
      <path d={dataPath} fill={C.accent} fillOpacity="0.15" stroke={C.accent} strokeWidth="2"/>
      {data.map((d,i)=>{ const p=pt(i,d.value); return <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={C.accent}/>; })}
      {data.map((d,i)=>{ const a=axPt(i); const anchor=a.lx<cx-5?"end":a.lx>cx+5?"start":"middle"; return (
        <text key={i} x={a.lx} y={a.ly+4} textAnchor={anchor} fontSize="10" fill={C.muted}>{d.label}</text>
      );})}
    </svg>
  );
}

function ShareLinkModal({ book, onClose }) {
  const [copied, setCopied] = useState(false);
  const url = book._url || "";
  const copy = () => {
    const doCopy = () => { setCopied(true); setTimeout(()=>setCopied(false),2000); };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(url).then(doCopy).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    function fallbackCopy() {
      try {
        const ta = document.createElement("textarea");
        ta.value = url; ta.style.cssText = "position:fixed;opacity:0;top:0;left:0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        doCopy();
      } catch(e) {}
    }
  };
  return (
    <Modal onClose={onClose}>
      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:700, color:C.text, marginBottom:6 }}>share link</div>
      <div style={{ fontSize:12, color:C.muted, marginBottom:16, lineHeight:1.6 }}>
        Anyone with this link can view a read-only page for <strong>{book.title}</strong> — score, pillars, and radar. No account needed.
      </div>
      <div style={{ background:C.warm, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px", fontSize:11, color:C.muted, wordBreak:"break-all", marginBottom:14, lineHeight:1.5 }}>
        {url}
      </div>
      <button onClick={copy} style={primaryBtn}>{copied ? "copied ✓" : "copy link"}</button>
      <div style={{ marginTop:8 }}>
        <button onClick={onClose} style={{ ...ghostBtn(C.muted), fontSize:12 }}>close</button>
      </div>
    </Modal>
  );
}

  const test = async () => {

      <div style={{ display:"flex", gap:8, marginBottom:10 }}>
        <button onClick={test} disabled={!url||!key||testing} style={{ ...ghostBtn(C.accentL), flex:1 }}>{testing?"testing…":"test connection"}</button>

  );

function CloudIndicator({ status }) {
  if (!status) return null;

  const colors = {
    idle:    { cloud: "#a8c5a0", tick: "#6a9e61" },
    syncing: { cloud: "#c4b49a", tick: "none" },
    error:   { cloud: "#d4957a", tick: "#b05e3a" },
    offline: { cloud: "#c8c0b4", tick: "none" },
  };
  const col = colors[status] || colors.offline;

  const titles = {
    idle: "synced ✓",
    syncing: "syncing…",
    error: "sync failed",
    offline: "offline",
  };

  return (
    <svg
      width="22" height="18" viewBox="0 0 22 18" fill="none"
      xmlns="http://www.w3.org/2000/svg"
      title={titles[status] || ""}

        fill={col.cloud}
        opacity="0.85"
      />
      {status === "idle" && (
        <path
          d="M8 10.5L10 12.5L14 8.5"
          stroke={col.tick}
          strokeWidth="1.6"
          strokeLinecap="round"
          strokeLinejoin="round"

      )}

  );
}
